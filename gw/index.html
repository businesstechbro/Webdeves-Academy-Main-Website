<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-height: 100vh;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%), url('https://via.placeholder.com/600x800?text=Welcome') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .left-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
        }
        .left-side h1 {
            color: white;
            font-size: 48px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 1;
            position: relative;
        }
        .right-side {
            flex: 1;
            background-color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #1877f2;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo i {
            margin-right: 10px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1877f2 0%, #42a5f5 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(24, 119, 242, 0.4);
        }
        .forgot-password {
            text-align: center;
            margin-top: 20px;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .forgot-password:hover {
            color: #166fe5;
            text-decoration: underline;
        }
        .create-account {
            text-align: center;
            margin-top: 30px;
            padding: 15px;
            border: 2px solid #42b72a;
            border-radius: 8px;
            background: linear-gradient(135deg, #42b72a 0%, #66bb6a 100%);
            color: white;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .create-account:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 183, 42, 0.4);
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                min-height: auto;
                margin: 20px;
                border-radius: 10px;
            }
            .left-side {
                min-height: 300px;
            }
            .left-side h1 {
                font-size: 36px;
            }
            .right-side {
                padding: 30px 20px;
            }
            .logo {
                font-size: 36px;
            }
        }
        .left-side img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .close:hover {
            color: black;
        }
        .modal h2 {
            text-align: center;
            color: #1877f2;
            margin-bottom: 20px;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #ddd;
        }
        .divider span {
            padding: 0 10px;
            color: #999;
            font-size: 14px;
        }
        .google-login {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
        }
        .google-login:hover {
            border-color: #d0d0d0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }
        .google-logo {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
        .google-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        .google-modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 50px 40px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease;
        }
        .google-modal-content h1 {
            text-align: center;
            color: #202124;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 400;
        }
        .google-modal-content p {
            text-align: center;
            color: #5f6368;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .google-close {
            color: #80868b;
            float: left;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }
        .google-close:hover {
            color: #202124;
        }
        .google-form-group {
            margin-bottom: 24px;
            position: relative;
        }
        .google-form-group label {
            display: block;
            color: #202124;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .google-form-group input {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background-color: #f8f9fa;
        }
        .google-form-group input:focus {
            outline: none;
            border-color: #4285f4;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.1);
        }
        .google-button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .google-back-btn {
            color: #1f71c6;
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 10px;
            transition: color 0.2s ease;
        }
        .google-back-btn:hover {
            color: #0d47a1;
            text-decoration: underline;
        }
        .google-next-btn {
            background: linear-gradient(to bottom, #4285f4, #2d5be3);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .google-next-btn:hover {
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.3);
            transform: translateY(-1px);
        }
        @media (max-width: 480px) {
            .google-modal-content {
                padding: 30px 20px;
                margin: 20% auto;
            }
            .google-modal-content h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-side">
            
            <img src="/gw/images/banner.png" alt="">
        </div>
        <div class="right-side">
            <div class="logo">
                <i class="fab fa-facebook"></i>facebook
            </div>
            <form>
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Email or phone number" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit">Log In</button>
            </form>
            <div class="divider"><span>OR</span></div>
            <a href="#" class="google-login" onclick="loginWithGoogle(event)">
                <svg class="google-logo" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </a>
            <a href="#" class="forgot-password" onclick="openModal()">Forgot password?</a>
        </div>
    </div>
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Reset Password</h2>
            <form>
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Username or Email" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="New Password" required>
                </div>
                <button type="submit">Reset Password</button>
            </form>
        </div>
    </div>
    <div id="googleModal" class="google-modal">
        <div class="google-modal-content">
            <span class="google-close" onclick="closeGoogleModal()">&larr;</span>
            <h1>Google</h1>
            <p>Sign in with your Google Account</p>
            <form id="googleLoginForm">
                <div class="google-form-group">
                    <label for="google-email">Email or phone</label>
                    <input type="email" id="google-email" placeholder="you@example.com" required>
                </div>
                <div class="google-form-group">
                    <label for="google-password">Password</label>
                    <input type="password" id="google-password" placeholder="Enter your password" required>
                </div>
                <div class="google-button-group">
                    <button type="button" class="google-back-btn" onclick="closeGoogleModal()">Back</button>
                    <button type="submit" class="google-next-btn">Next</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        function openModal() {
            document.getElementById('forgotModal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('forgotModal').style.display = 'none';
        }
        window.onclick = function(event) {
            if (event.target == document.getElementById('forgotModal')) {
                closeModal();
            }
            if (event.target == document.getElementById('googleModal')) {
                closeGoogleModal();
            }
        }
        function loginWithGoogle(event) {
            event.preventDefault();
            document.getElementById('googleModal').style.display = 'block';
        }
        function closeGoogleModal() {
            document.getElementById('googleModal').style.display = 'none';
        }
        document.getElementById('googleLoginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('google-email').value;
            const password = document.getElementById('google-password').value;
            alert('Login attempt with:\nEmail: ' + email + '\n\nIn production, this would authenticate with Google services.');
            // In production, this would send credentials to your backend for Google OAuth authentication
        });
    </script>
